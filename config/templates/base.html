{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <title>タスク管理</title>
    <meta charset="UTF-8">
    <meta name="description" content="タスク管理">
    <meta name="viewpoint" content="width=device-width, initial-scale1.0">
    <link rel="stylesheet" href="{% static 'task/style.css' %}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
  <header>
    <div class="basetitle">
      <a href="{% url 'task_combined' %}">タスク管理</a>
    </div>

     <!-- ナビゲーションバー -->
    <nav class="nav-bar">
        <ul>
            <li><a href="{% url 'task_combined' %}">ホーム</a></li>
            <li><a href="{% url 'task_combined' %}">このアプリについて</a></li>
            <li><a href="{% url 'task_combined' %}">サービス</a></li>
            <li><a href="{% url 'task_combined' %}">お問い合わせ</a></li>
        </ul>
    </nav>
    <!-- 検索フォーム -->
    <form action="" method="get">
      <input type="search" name="q" placeholder="タスク検索" value="{{ request.GET.q }}">
      <button type="submit">検索</button>
    </form>
    {% if user.is_authenticated %}
          <form class="loginout" action="{% url 'logout' %}" method="POST">
            {% csrf_token %}
            <button>ログアウト</button>
          </form>
        {% else %}
          <a href="{% url 'login' %}">ログイン</a>
        {% endif %}



  </header>
    <main>
        {% block content %}
        {% endblock %}
    </main>
    <footer>
    </footer>
</body>
</html>
